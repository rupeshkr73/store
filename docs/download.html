<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download — RD Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f7ff; --white: #fff; --accent: #4f46e5; --accent2: #7c3aed;
      --text: #1a1a2e; --muted: #6b7280; --green: #059669; --red: #ef4444;
      --border: #dde2f0; --font: 'Outfit', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px;
      max-width: 440px; width: 100%; text-align: center;
      box-shadow: 0 12px 48px rgba(79,70,229,0.10);
    }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
    .product-name {
      font-size: 1rem; color: var(--muted); margin-bottom: 28px;
    }
    .btn-download {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; padding: 16px 32px; border-radius: 100px;
      font-family: var(--font); font-size: 1rem; font-weight: 700;
      text-decoration: none; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(79,70,229,0.30);
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%; justify-content: center;
    }
    .btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(79,70,229,0.40); }
    .note {
      margin-top: 20px; font-size: 0.82rem; color: var(--muted);
      background: rgba(79,70,229,0.05); border-radius: 10px;
      padding: 12px 16px;
    }
    .error-box {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 12px; padding: 20px; color: var(--red);
    }
    .loading { color: var(--muted); font-size: 0.95rem; }
    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .wa-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #25d366; color: #fff; padding: 12px 24px;
      border-radius: 100px; font-family: var(--font);
      font-size: 0.9rem; font-weight: 600; text-decoration: none;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <p class="loading">Download prepare ho raha hai...</p>
  </div>

  <script>
    const API = 'https://digital-store-0f8n.onrender.com/api';

    async function loadDownload() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const card = document.getElementById('card');

      if (!token) {
        card.innerHTML = `
          <div class="error-box">
            <div class="icon">❌</div>
            <h1>Invalid Link</h1>
            <p>Ye download link valid nahi hai.</p>
          </div>
          <a href="https://wa.me/917992384657" class="wa-btn">💬 WhatsApp Karo</a>
        `;
        return;
      }

      try {
        const res = await fetch(`${API}/payment/download/${token}`);
        const data = await res.json();

        if (!data.success) {
          card.innerHTML = `
            <div class="error-box">
              <div class="icon">⏰</div>
              <h1>Link Expire Ho Gaya</h1>
              <p>${data.message}</p>
            </div>
            <a href="https://wa.me/917992384657" class="wa-btn">💬 WhatsApp Karo</a>
          `;
          return;
        }

        card.innerHTML = `
          <div class="icon">✅</div>
          <h1>Payment Verified!</h1>
          <p class="product-name">${data.product_name}</p>
          <a href="${data.download_url}" download="${data.file_name}" class="btn-download">
            📥 Download Karo
          </a>
          <div class="note">
            ⚠️ Ye link sirf kuch ghante valid hai.<br/>
            File save kar lo abhi!
          </div>
        `;

        // Auto download
        setTimeout(() => {
          window.location.href = data.download_url;
        }, 1500);

      } catch (err) {
        card.innerHTML = `
          <div class="error-box">
            <div class="icon">⚠️</div>
            <h1>Kuch Galat Hua</h1>
            <p>Server se connect nahi ho paya.</p>
          </div>
          <a href="https://wa.me/917992384657" class="wa-btn">💬 WhatsApp Karo</a>
        `;
      }
    }

    loadDownload();
  </script>
</body>
</html>
