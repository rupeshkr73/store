<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — RD Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f; --surface: #13131a; --card: #1c1c27;
      --border: #2a2a3d; --accent: #7c6fcd; --accent2: #c084fc;
      --text: #e8e8f0; --muted: #8888aa; --green: #4ade80;
      --red: #f87171; --radius: 12px;
      --font: 'Space Grotesk', sans-serif;
      --font-display: 'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px;
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px;
      width: 100%; max-width: 380px; text-align: center;
    }
    .login-icon { font-size: 3rem; margin-bottom: 16px; }
    .login-box h2 {
      font-family: var(--font-display);
      font-size: 1.6rem; margin-bottom: 8px;
    }
    .login-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }
    .input-group { margin-bottom: 16px; text-align: left; }
    .input-group label {
      display: block; font-size: 0.8rem; color: var(--muted);
      font-weight: 500; margin-bottom: 6px;
    }
    input[type="password"], input[type="text"], input[type="number"],
    textarea, select {
      width: 100%; padding: 12px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: var(--font); font-size: 0.95rem;
      transition: border-color 0.2s; outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }
    textarea { resize: vertical; min-height: 80px; }

    .btn {
      width: 100%; padding: 13px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; font-family: var(--font);
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm {
      width: auto; padding: 8px 16px; font-size: 0.82rem;
      border-radius: 8px;
    }
    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #f87171);
    }
    .btn-ghost {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

    /* ── ADMIN LAYOUT ── */
    #admin-screen { display: none; min-height: 100vh; }

    .admin-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 18px 32px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .admin-logo {
      font-family: var(--font-display); font-size: 1.2rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-right { display: flex; gap: 12px; align-items: center; }

    .admin-body { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 40px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 24px;
    }
    .stat-card .label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
    .stat-card .value {
      font-family: var(--font-display); font-size: 2rem;
      font-weight: 800; margin-top: 4px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ── ADD PRODUCT FORM ── */
    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px; margin-bottom: 32px;
    }
    .panel-title {
      font-family: var(--font-display); font-size: 1.1rem;
      font-weight: 700; margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .full { grid-column: 1 / -1; }

    .file-input-label {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px;
      border: 2px dashed var(--border); border-radius: 10px;
      padding: 24px; cursor: pointer; transition: border-color 0.2s;
      color: var(--muted); font-size: 0.85rem; text-align: center;
    }
    .file-input-label:hover { border-color: var(--accent); }
    .file-input-label input { display: none; }
    .file-input-label .file-icon { font-size: 2rem; }
    .file-name-display {
      font-size: 0.8rem; color: var(--green);
      margin-top: 4px;
    }

    /* ── PRODUCT TABLE ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 12px 16px;
      font-size: 0.75rem; color: var(--muted);
      font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); }

    .product-thumb-small {
      width: 48px; height: 48px; border-radius: 8px;
      object-fit: cover; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; overflow: hidden;
    }
    .product-thumb-small img { width: 100%; height: 100%; object-fit: cover; }

    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 100px; font-size: 0.72rem; font-weight: 600;
    }
    .badge-active { background: #4ade8022; color: var(--green); }
    .badge-inactive { background: #f8717122; color: var(--red); }

    .actions { display: flex; gap: 8px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 20px;
      font-size: 0.88rem; z-index: 999;
      transform: translateY(80px); opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      max-width: 300px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--green); }
    #toast.error { border-color: var(--red); }

    /* ── LOADING ── */
    .spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: currentColor;
      display: inline-block;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <h2>Admin Login</h2>
    <p>Sirf Rupesh ka access hai</p>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password-input" placeholder="Enter password" />
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">Login</button>
    <p id="login-error" style="color:var(--red);font-size:0.85rem;margin-top:12px;display:none;">
      ❌ Wrong password
    </p>
  </div>
</div>

<!-- ── ADMIN ── -->
<div id="admin-screen">
  <div class="admin-header">
    <div class="admin-logo">RD Store — Admin</div>
    <div class="header-right">
      <a href="index.html" style="color:var(--muted);text-decoration:none;font-size:0.85rem;">← Store dekho</a>
      <button class="btn btn-sm btn-ghost" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Total Products</div>
        <div class="value" id="admin-stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Active Products</div>
        <div class="value" id="admin-stat-active">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Value</div>
        <div class="value" id="admin-stat-value">—</div>
      </div>
    </div>

    <!-- Add Product -->
    <div class="panel">
      <div class="panel-title">➕ Naya Product Daalo</div>

      <div class="form-grid">
        <div class="input-group">
          <label>Product Name *</label>
          <input type="text" id="p-name" placeholder="QR Se Print System" />
        </div>
        <div class="input-group">
          <label>Category</label>
          <select id="p-category">
            <option value="Software">Software</option>
            <option value="Print">Print</option>
            <option value="Resume">Resume</option>
            <option value="Wedding">Wedding</option>
            <option value="General">General</option>
          </select>
        </div>
        <div class="input-group full">
          <label>Description</label>
          <textarea id="p-desc" placeholder="Product ke baare mein batao..."></textarea>
        </div>
        <div class="input-group">
          <label>Price (₹) *</label>
          <input type="number" id="p-price" placeholder="499" min="1" />
        </div>
        <div></div>
        <div class="input-group">
          <label>Thumbnail (optional)</label>
          <label class="file-input-label" id="thumb-label">
            <span class="file-icon">🖼️</span>
            <span>Click to upload image</span>
            <span class="file-name-display" id="thumb-name"></span>
            <input type="file" id="p-thumbnail" accept="image/*" onchange="showFileName(this,'thumb-name')" />
          </label>
        </div>
        <div class="input-group">
          <label>Product File (ZIP/PDF) *</label>
          <label class="file-input-label" id="file-label">
            <span class="file-icon">📦</span>
            <span>Click to upload file</span>
            <span class="file-name-display" id="file-name"></span>
            <input type="file" id="p-file" accept=".zip,.pdf,.rar" onchange="showFileName(this,'file-name')" />
          </label>
        </div>
      </div>

      <div style="margin-top: 20px;">
        <button class="btn" style="max-width:240px;" id="add-btn" onclick="addProduct()">
          Product Upload Karo
        </button>
        <span id="upload-status" style="margin-left:12px;font-size:0.85rem;color:var(--muted);"></span>
      </div>
    </div>

    <!-- Product List -->
    <div class="panel">
      <div class="panel-title">📦 Sare Products</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th></th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:40px;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  const API = 'https://digital-store-0f8n.onrender.com/api'; // <-- apna URL daalo
  let adminPassword = '';

  // ── LOGIN ─────────────────────────────────────
  document.getElementById('password-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const pass = document.getElementById('password-input').value;
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Checking...';

    try {
      const res = await fetch(`${API}/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass })
      });
      const data = await res.json();

      if (data.success) {
        adminPassword = pass;
        sessionStorage.setItem('admin_pass', pass);
        showAdmin();
      } else {
        document.getElementById('login-error').style.display = 'block';
        btn.disabled = false; btn.textContent = 'Login';
      }
    } catch (err) {
      toast('❌ Server se connect nahi ho raha', 'error');
      btn.disabled = false; btn.textContent = 'Login';
    }
  }

  function showAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadAdminProducts();
  }

  function logout() {
    sessionStorage.removeItem('admin_pass');
    adminPassword = '';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('password-input').value = '';
  }

  // ── AUTO LOGIN from session ───────────────────
  window.addEventListener('load', () => {
    const saved = sessionStorage.getItem('admin_pass');
    if (saved) { adminPassword = saved; showAdmin(); }
  });

  // ── LOAD PRODUCTS ─────────────────────────────
  async function loadAdminProducts() {
    try {
      const res = await fetch(`${API}/admin/products`, {
        headers: { 'x-admin-password': adminPassword }
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);

      renderTable(data.products);
      updateStats(data.products);
    } catch (err) {
      toast('❌ Products load nahi hue: ' + err.message, 'error');
    }
  }

  function updateStats(products) {
    const active = products.filter(p => p.is_active);
    const totalVal = active.reduce((s, p) => s + p.price, 0);
    document.getElementById('admin-stat-total').textContent = products.length;
    document.getElementById('admin-stat-active').textContent = active.length;
    document.getElementById('admin-stat-value').textContent = '₹' + (totalVal / 100).toFixed(0);
  }

  // ── RENDER TABLE ──────────────────────────────
  function renderTable(products) {
    const tbody = document.getElementById('products-tbody');
    if (!products.length) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:40px;">
        Koi product nahi. Upar se add karo!
      </td></tr>`;
      return;
    }

    tbody.innerHTML = products.map(p => `
      <tr>
        <td>
          <div class="product-thumb-small">
            ${p.thumbnail_url
              ? `<img src="${p.thumbnail_url}" alt="${p.name}" />`
              : '📦'
            }
          </div>
        </td>
        <td><strong>${p.name}</strong><br/><small style="color:var(--muted)">${p.file_name || ''}</small></td>
        <td>${p.category || '—'}</td>
        <td style="font-weight:700;">₹${(p.price / 100).toFixed(0)}</td>
        <td>
          <span class="badge ${p.is_active ? 'badge-active' : 'badge-inactive'}">
            ${p.is_active ? 'Active' : 'Hidden'}
          </span>
        </td>
        <td>
          <div class="actions">
            <button class="btn btn-sm btn-ghost" onclick="toggleActive('${p.id}', ${!p.is_active})">
              ${p.is_active ? 'Hide' : 'Show'}
            </button>
            <button class="btn btn-sm btn-danger" onclick="deleteProduct('${p.id}', '${p.name}')">
              Delete
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ── ADD PRODUCT ───────────────────────────────
  async function addProduct() {
    const name = document.getElementById('p-name').value.trim();
    const desc = document.getElementById('p-desc').value.trim();
    const price = document.getElementById('p-price').value;
    const cat = document.getElementById('p-category').value;
    const thumbFile = document.getElementById('p-thumbnail').files[0];
    const productFile = document.getElementById('p-file').files[0];

    if (!name || !price || !productFile) {
      toast('⚠️ Name, price aur file required hai!', 'error');
      return;
    }

    const btn = document.getElementById('add-btn');
    const status = document.getElementById('upload-status');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Uploading...`;
    status.textContent = 'File upload ho rahi hai...';

    const formData = new FormData();
    formData.append('name', name);
    formData.append('description', desc);
    formData.append('price', Math.round(parseFloat(price) * 100)); // ₹ to paise
    formData.append('category', cat);
    formData.append('file', productFile);
    if (thumbFile) formData.append('thumbnail', thumbFile);

    try {
      const res = await fetch(`${API}/admin/products`, {
        method: 'POST',
        headers: { 'x-admin-password': adminPassword },
        body: formData
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);

      toast('✅ Product add ho gaya!', 'success');
      clearForm();
      loadAdminProducts();
    } catch (err) {
      toast('❌ Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Product Upload Karo';
      status.textContent = '';
    }
  }

  // ── TOGGLE ACTIVE ─────────────────────────────
  async function toggleActive(id, newStatus) {
    try {
      const res = await fetch(`${API}/admin/products/${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'x-admin-password': adminPassword
        },
        body: JSON.stringify({ is_active: newStatus })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      toast(newStatus ? '👁️ Product visible hua' : '🙈 Product hide hua', 'success');
      loadAdminProducts();
    } catch (err) {
      toast('❌ ' + err.message, 'error');
    }
  }

  // ── DELETE ────────────────────────────────────
  async function deleteProduct(id, name) {
    if (!confirm(`"${name}" delete karna chahte ho?`)) return;
    try {
      const res = await fetch(`${API}/admin/products/${id}`, {
        method: 'DELETE',
        headers: { 'x-admin-password': adminPassword }
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      toast('🗑️ Product delete ho gaya', 'success');
      loadAdminProducts();
    } catch (err) {
      toast('❌ ' + err.message, 'error');
    }
  }

  // ── HELPERS ───────────────────────────────────
  function showFileName(input, targetId) {
    const name = input.files[0]?.name || '';
    document.getElementById(targetId).textContent = name;
  }

  function clearForm() {
    ['p-name','p-desc','p-price'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('p-thumbnail').value = '';
    document.getElementById('p-file').value = '';
    document.getElementById('thumb-name').textContent = '';
    document.getElementById('file-name').textContent = '';
  }

  function toast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = type ? `show ${type}` : 'show';
    setTimeout(() => t.className = '', 3500);
  }
</script>
</body>
</html>
